name: PR To Main

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-main-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conductor-app:
    name: Conductor app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conductor-app
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/conductor?schema=conductor_app
      AUTH_SECRET: ci-auth-secret-value-with-32-plus-chars
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "false"
      ADMIN_EMAILS: ci-admin@example.com
      SKILL_EVENTS_TOKEN: ci-skill-events-token-with-32-plus-chars
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: conductor-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  skills-mcp-server:
    name: MCP server build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills-mcp-server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills-mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build

  skills-vscode-extension:
    name: VS Code extension build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills-vscode-extension
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills-vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run compile-check

      - name: Build extension
        run: npm run build
