name: Direct Main Guard

on:
  push:
    branches:
      - main

jobs:
  block-direct-push:
    name: Direct push warning
    runs-on: ubuntu-latest
    steps:
      - name: Fail direct pushes to main
        run: |
          echo "Direct pushes to main are not allowed for this repository."
          echo "Push your work to a branch and merge through a pull request after CI passes."
          exit 1
